name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile-check all modules
        run: python -m compileall -q .
      - name: Import core modules
        run: |
          python -c "import config; import data_fetcher; import paper_trader"
          python -c "import strategy_engine; import forex_strategy; import london_breakout; import killzone_reversal"
